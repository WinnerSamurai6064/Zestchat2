<!DOCTYPE html>

<html>
<head>
  <base href="/zestchat/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="ZestChat — hyper-optimized web-first chat app.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ZestChat">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>ZestChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background-color: #060608; }
    #loading {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 20px;
    }
    .zest-logo {
      width: 52px; height: 52px; background: #CCF143;
      border-radius: 14px; display: flex; align-items: center;
      justify-content: center; font-size: 28px;
    }
    .zest-spinner {
      width: 28px; height: 28px; border: 3px solid #1A1D28;
      border-top-color: #CCF143; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="zest-logo">&#9889;</div>
    <div class="zest-spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
    // Safety fallback — hide loader after 10s if flutter-first-frame never fires
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    }, 10000);
  </script>

  <script src="flutter_bootstrap.js" async></script>

</body>
</html>
